<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Ernest Julio C. De Jesus</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #0f172a;
            color: white;
            scroll-behavior: smooth;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="font-sans antialiased">

    <!-- START SCREEN -->
    <section id="start-screen" class="fixed inset-0 flex items-center justify-center bg-slate-950 z-50 px-6">
        <div class="glass rounded-[2.5rem] p-10 text-center max-w-xl w-full">

            <h1 class="text-5xl font-black mb-4">Ready for the Quiz?</h1>

            <div class="flex flex-col sm:flex-row gap-4 justify-center">

                <button onclick="startQuiz()"
                    class="px-8 py-4 bg-cyan-400 text-slate-900 font-black rounded-2xl hover:scale-105 transition">
                    Yes, I'm Ready
                </button>

                <button onclick="window.location.href='../index.html'"
                    class="px-8 py-4 bg-red-500 text-white font-black rounded-2xl hover:scale-105 transition">
                    No, Go Back
                </button>

            </div>

        </div>
    </section>

    <!-- QUIZ -->
    <section id="quiz" class="hidden py-20 px-6 bg-slate-900/30">

        <div class="max-w-3xl mx-auto">

            <div class="glass rounded-[2.5rem] p-8 md:p-12 border border-slate-700">

                <!-- HEADER -->
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h2 class="text-3xl font-black">Professor's Quiz</h2>
                        <p id="q-progress" class="text-cyan-400 font-mono text-sm"></p>
                    </div>

                    <div class="text-right">
                        <span class="text-slate-500 text-xs uppercase font-bold block mb-1">Strikes</span>
                        <div id="strike-container" class="flex gap-2 justify-end">
                            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                            <div class="w-3 h-3 rounded-full bg-slate-700"></div>
                        </div>
                    </div>
                </div>

                <!-- QUESTION -->
                <h3 id="question-text" class="text-2xl font-bold mb-8 min-h-[60px]"></h3>

                <!-- FEEDBACK -->
                <div id="feedback-container" class="hidden text-center mb-6">
                    <img id="feedback-gif" class="mx-auto max-h-48 rounded-xl border border-slate-700">
                    <p id="feedback-text" class="mt-3 font-bold"></p>
                </div>

                <!-- OPTIONS -->
                <div id="options-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

            </div>

            <!-- FINISH -->
            <div id="finish-screen" class="hidden text-center py-10">
                <h2 class="text-4xl font-black mb-4">Quiz Completed 🎉</h2>

                <p class="text-slate-400">Playing final sequence...</p>

                <button onclick="restartQuiz()" class="mt-6 px-8 py-3 bg-cyan-500 text-slate-900 font-bold rounded-xl">
                    Restart Quiz
                </button>

                <button onclick="result()" class="mt-6 px-8 py-3 bg-cyan-500 text-slate-900 font-bold rounded-xl">
                    Show Result
                </button>

            </div>

        </div>
    </section>

    <!-- RESULT MODAL -->
    <div id="result-modal" class="fixed inset-0 hidden items-center justify-center bg-black/70 z-50">

        <div class="glass rounded-3xl p-10 max-w-md w-full text-center">

            <h2 class="text-3xl font-black mb-4">Your Result</h2>

            <p id="result-text" class="text-slate-300 text-lg mb-6"></p>

            <button onclick="finishQuiz()" class="px-8 py-3 bg-cyan-500 text-slate-900 font-bold rounded-xl">
                Finish
            </button>

        </div>

    </div>

    <script>

        /* AUDIO */
        const correctSound = new Audio('sounds/correct.mp3');
        const wrongSound = new Audio('sounds/wrong.mp3');
        const finishSound = new Audio('sounds/victory.mp3');

        const bgm = new Audio('sounds/bgm.mp3');
        bgm.loop = true;
        bgm.volume = 0.4;

        const outroBgm = new Audio('sounds/outro.mp3');
        outroBgm.loop = true;
        outroBgm.volume = 0.4;

        /* DATA */
        const quizData = [
            {
                q: "For professional records, identify the Full Name of your instructor.",
                options: ["Julio Ernest C. De Jesus", "Ernest Julio C. De Jesus", "Ernest De Jesus Jr.", "Julio C. Ernest De Jesus"],
                correct: 1
            },
            {
                q: "Which Pokémon character is my favorite due to its iconic design?",
                options: ["Pikachu", "Charizard", "Snorlax", "Lucario"],
                correct: 2
            },
            {
                q: "What is my current age according to my professional profile?",
                options: ["23", "26", "25", "22"],
                correct: 0
            },
            {
                q: "Which sport do I actively follow and consider my favorite?",
                options: ["Volleyball", "Football", "Basketball", "Badminton"],
                correct: 2
            },
            {
                q: "Aside from development, which hobby do I spend my leisure time on?",
                options: ["Reading Books", "Hiking", "Cooking", "Playing Online Games"],
                correct: 3
            }
        ];

        /* STATE */
        let currentIdx = 0;
        let strikes = 0;
        let userAnswers = [];

        /* START */
        function startQuiz() {
            document.getElementById('start-screen').style.display = "none";
            document.getElementById('quiz').classList.remove('hidden');

            bgm.play().catch(() => { });

            loadQuestion();
        }

        /* LOAD */
        function loadQuestion() {

            if (currentIdx >= quizData.length) {

                document.getElementById('options-grid').classList.add('hidden');
                document.getElementById('feedback-container').classList.add('hidden');
                document.getElementById('question-text').innerText = "";

                document.getElementById('finish-screen').classList.remove('hidden');

                bgm.pause();

                finishSound.currentTime = 0;
                finishSound.play().catch(() => { });

                finishSound.onended = () => {
                    outroBgm.currentTime = 0;
                    outroBgm.play().catch(() => { });
                };

                return;
            }

            const q = quizData[currentIdx];

            document.getElementById('q-progress').innerText =
                `Question ${currentIdx + 1} of ${quizData.length}`;

            document.getElementById('question-text').innerText = q.q;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = "";
            grid.classList.remove('hidden');

            /* RESET FEEDBACK EVERY QUESTION */
            document.getElementById('feedback-container').classList.add('hidden');
            document.getElementById('feedback-gif').src = "";
            document.getElementById('feedback-text').innerText = "";

            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "p-4 rounded-2xl bg-slate-800/40 border border-slate-700 hover:border-cyan-500 transition";
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(i);
                grid.appendChild(btn);
            });
        }

        /* ANSWER */
        function handleAnswer(choice) {

            userAnswers[currentIdx] = choice;

            const q = quizData[currentIdx];

            const feedback = document.getElementById('feedback-container');
            const gif = document.getElementById('feedback-gif');
            const text = document.getElementById('feedback-text');

            document.getElementById('options-grid').classList.add('hidden');
            feedback.classList.remove('hidden');

            if (choice === q.correct) {

                correctSound.play().catch(() => { });

                gif.src = "img/correct.gif";
                text.innerText = "Correct!";
                text.className = "mt-3 font-bold text-green-400";

                setTimeout(() => {
                    currentIdx++;
                    loadQuestion();
                }, 1200);

            } else {

                wrongSound.play().catch(() => { });
                strikes++;

                gif.src = "img/squirt.gif";
                text.innerText = "Wrong!";
                text.className = "mt-3 font-bold text-red-500";

                setTimeout(() => {
                    if (strikes >= 3) {
                        restartQuiz();
                    } else {
                        loadQuestion();
                    }
                }, 1200);
            }
        }

        /* RESULT */
        function result() {

            let score = 0;

            quizData.forEach((q, i) => {
                if (userAnswers[i] === q.correct) score++;
            });

            let message =
                score === quizData.length
                    ? `Perfect Score 🎉 (${score}/${quizData.length})`
                    : score >= quizData.length / 2
                        ? `Good Job 👍 (${score}/${quizData.length})`
                        : `Try Again 📘 (${score}/${quizData.length})`;

            document.getElementById("result-text").innerText = message;

            document.getElementById("result-modal").classList.remove("hidden");
            document.getElementById("result-modal").classList.add("flex");
        }

        /* FINISH */
        function finishQuiz() {
            window.location.href = "../index.html";
        }

        /* RESTART */
        function restartQuiz() {

            currentIdx = 0;
            strikes = 0;
            userAnswers = [];

            bgm.pause();
            outroBgm.pause();

            loadQuestion();
        }

        /* INIT */
        window.onload = () => {
            document.getElementById('quiz').classList.add('hidden');
        };

    </script>

</body>

</html>
